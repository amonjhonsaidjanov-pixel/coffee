<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Молочний фон */
        body { font-family: 'Segoe UI', sans-serif; background: #fdfaf6; padding: 10px; color: #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .card { background: white; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 90px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
        
        /* Ном ва қора нарх */
        .name { font-size: 13px; font-weight: 500; height: 35px; margin-bottom: 5px; }
        .price { font-weight: 800; color: #000; margin-bottom: 8px; }
        
        /* Оқ тугма */
        button { 
            width: 100%; background: #ffffff; color: #000; 
            border: 1px solid #ddd; padding: 6px; border-radius: 6px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:active { background: #f0f0f0; }
        
        #order-btn { 
            width: 100%; background: #4CAF50; color: white; border: none; 
            padding: 15px; border-radius: 10px; margin-top: 20px; font-size: 16px;
        }
    </style>
</head>
<body>
    <h2 style="text-align:center; color: #4e342e;">Deep Coffee</h2>
    <div class="grid" id="menu"></div>
    <button id="order-btn" onclick="sendOrder()">🛒 Буюртмани тасдиқлаш</button>

    <script>
        const menu = [
            { name: "Латте / Latte", price: 330, img: "https://images.unsplash.com/photo-1570968915860-54da5c3080e7" },
            { name: "Капучино / Cappuccino", price: 330, img: "https://images.unsplash.com/photo-1534778101976-62847bb82c03" },
            { name: "Американо / Americano", price: 290, img: "https://images.unsplash.com/photo-1551066404-70e03e547343" },
            { name: "Манго Смузи / Mango Smoothie", price: 500, img: "https://images.unsplash.com/photo-1590301157890-4810ed352733" }
        ];
        let cart = [];
        
        function display() {
            const div = document.getElementById('menu');
            menu.forEach((item, i) => {
                div.innerHTML += `<div class="card">
                    <img src="${item.img}" alt="${item.name}">
                    <div class="name">${item.name}</div>
                    <div class="price">${item.price} сўм</div>
                    <button onclick="add(${i})">Қўшиш</button>
                </div>`;
            });
        }
        function add(i) { cart.push(menu[i]); alert(menu[i].name + " қўшилди!"); }
        function sendOrder() {
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            Telegram.WebApp.sendData(JSON.stringify({items: cart.map(i=>i.name).join(', '), total_price: total}));
        }
        display();
    </script>
</body>
</html>
