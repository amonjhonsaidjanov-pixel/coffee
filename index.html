<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdfaf6; padding-bottom: 80px; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: white; border-radius: 15px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 90px; object-fit: cover; border-radius: 10px; }
        .add-btn { width: 100%; background: #4CAF50; color: white; border: none; padding: 10px; border-radius: 10px; font-weight: bold; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; }
    </style>
</head>
<body>
    <div id="content">
        <h2 style="text-align: center;">Deep Coffee</h2>
        <div class="grid" id="menu"></div>
    </div>

    <div class="tab-bar">
        <div onclick="showPage('menu')">🏠 Бош</div>
        <div onclick="showPage('cart')">🛒 Сават (<span id="cart-count">0</span>)</div>
        <div onclick="showPage('orders')">📝 Буюртма</div>
        <div onclick="showPage('profile')">👤 Профиль</div>
    </div>

    <script>
        const menu = [
            { id: 1, name: "Латте", price: 33000, img: "https://images.unsplash.com/photo-1593482836723" },
            { id: 2, name: "Капучино", price: 35000, img: "https://images.unsplash.com/photo-1518778101976" }
        ];
        
        // Саватни сақлаш
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function add(id) {
            const item = menu.find(m => m.id === id);
            cart.push(item);
            updateCart();
            alert(item.name + " қўшилди!");
        }

        function displayMenu() {
            const div = document.getElementById('menu');
            menu.forEach(item => {
                div.innerHTML += `<div class="card">
                    <img src="${item.img}">
                    <div>${item.name}</div>
                    <div style="color:red;">${item.price} сўм</div>
                    <button class="add-btn" onclick="add(${item.id})">+</button>
                </div>`;
            });
        }

        function showPage(page) {
            if(page === 'profile') alert("Исм: " + (localStorage.getItem('user_name') || "Меҳмон"));
            // Бу ерда саҳифаларни алмаштириш мантиғини қўшасиз
        }

        displayMenu();
        updateCart();
    </script>
</body>
</html>
