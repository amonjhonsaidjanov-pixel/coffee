<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f4f4f4; }
        .item { background: white; padding: 10px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; }
        button { background: #4CAF50; color: white; border: none; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Deep Coffee Menu</h2>
    <div id="menu"></div>
    <button onclick="sendOrder()" style="width: 100%; padding: 15px; margin-top: 20px;">Буюртма бериш / Заказать / Order</button>

    <script>
        const menu = [
            { name: "Латте / Latte", price: 330 },
            { name: "Капучино / Cappuccino", price: 330 },
            { name: "Американо / Americano", price: 290 },
            { name: "Смузи манго-апельсин", price: 500 }
        ];
        let cart = [];
        
        function display() {
            const div = document.getElementById('menu');
            menu.forEach((item, i) => {
                div.innerHTML += `<div class="item">${item.name} - ${item.price} сўм <button onclick="add(${i})">+</button></div>`;
            });
        }
        function add(i) { cart.push(menu[i]); alert("Қўшилди!"); }
        function sendOrder() {
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            const data = { items: cart.map(i => i.name).join(', '), total_price: total };
            Telegram.WebApp.sendData(JSON.stringify(data));
        }
        display();
    </script>
</body>
</html>
