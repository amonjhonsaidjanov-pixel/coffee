<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdfaf6; padding: 10px; padding-bottom: 80px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; border-radius: 15px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; }
        .add-btn { width: 100%; background: #f9f9f9; border: 1px solid #eee; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        /* Пастки меню (Tab Bar) */
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; box-shadow: 0 -2px 5px rgba(0,0,0,0.05); }
        .tab-item { text-align: center; font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <h2 style="text-align: center;">Deep Coffee</h2>
    <div class="grid" id="menu"></div>

    <!-- Пастки меню -->
    <div class="tab-bar">
        <div class="tab-item">🏠<br>Бош саҳифа</div>
        <div class="tab-item">🛒<br>Сават</div>
        <div class="tab-item">📝<br>Буюртмалар</div>
        <div class="tab-item">👤<br>Профиль</div>
    </div>

    <script>
        const menu = [
            { name: "Латте", price: 33000, img: "https://images.unsplash.com/photo-1593482836723-3806e2365319" },
            { name: "Капучино", price: 35000, img: "https://images.unsplash.com/photo-1518778101976-62847bb82c03" }
        ];
        function display() {
            const div = document.getElementById('menu');
            menu.forEach(item => {
                div.innerHTML += `<div class="card">
                    <img src="${item.img}">
                    <div style="font-weight:bold;">${item.name}</div>
                    <div style="color:red;">${item.price} сўм</div>
                    <button class="add-btn" onclick="alert('Қўшилди!')">+</button>
                </div>`;
            });
        }
        display();
    </script>
</body>
</html>
